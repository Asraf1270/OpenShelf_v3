<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Primary brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Text gradient for "Shelf" portion -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Subtle icon shadow -->
    <filter id="logoShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ===== ICON MARK ===== -->
  <g transform="translate(8, 8)" filter="url(#logoShadow)">
    <!-- Rounded square background -->
    <rect x="0" y="0" width="84" height="84" rx="20" ry="20" fill="url(#brandGrad)"/>

    <!-- Shelf base -->
    <rect x="16" y="60" width="52" height="3.5" rx="1.75" ry="1.75" fill="rgba(255,255,255,0.35)"/>

    <!-- Open book — left page -->
    <path d="M42 22 L18 32 L18 56 L42 46 Z" fill="white" opacity="0.95"/>

    <!-- Open book — right page -->
    <path d="M42 22 L66 32 L66 56 L42 46 Z" fill="white" opacity="0.75"/>

    <!-- Spine -->
    <line x1="42" y1="22" x2="42" y2="46" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>

    <!-- Left page lines -->
    <line x1="24" y1="38" x2="38" y2="34" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="24" y1="44" x2="36" y2="40.5" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

    <!-- Right page lines -->
    <line x1="46" y1="34" x2="60" y2="38" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="48" y1="40.5" x2="60" y2="44" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

    <!-- Sharing arrows -->
    <g opacity="0.45" fill="white" stroke="white" stroke-width="1" stroke-linecap="round">
      <path d="M48 17 C54 11, 60 13, 60 17" fill="none"/>
      <polygon points="60,15 63,18 59,19.5" stroke="none"/>
      <path d="M36 17 C30 11, 24 13, 24 17" fill="none"/>
      <polygon points="24,15 21,18 25,19.5" stroke="none"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(108, 0)">
    <!-- "Open" in dark navy -->
    <text x="0" y="62" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#0f172a" letter-spacing="-1">Open</text>

    <!-- "Shelf" in brand gradient -->
    <text x="126" y="62" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="42" fill="url(#textGrad)" letter-spacing="-1">Shelf</text>
  </g>

  <!-- Tagline -->
  <text x="108" y="82" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#64748b" letter-spacing="0.5">Share Books, Share Knowledge</text>
</svg>
